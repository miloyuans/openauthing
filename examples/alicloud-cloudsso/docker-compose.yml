services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openauthing
      POSTGRES_DB: openauthing
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - alicloud_cloudsso_postgres_data:/var/lib/postgresql/data
      - ../../:/workspace:ro

  redis:
    image: redis:7-alpine
    volumes:
      - alicloud_cloudsso_redis_data:/data

  openauthing:
    build:
      context: ../..
      dockerfile: deploy/docker/app.Dockerfile
    working_dir: /workspace
    command: go run -mod=mod ./cmd/server
    environment:
      OPENAUTHING_APP_NAME: openauthing
      OPENAUTHING_ENV: development
      OPENAUTHING_HTTP_ADDR: :8080
      OPENAUTHING_HTTP_ALLOWED_ORIGINS: "${OPENAUTHING_HTTP_ALLOWED_ORIGINS:-http://localhost,http://host.docker.internal}"
      OPENAUTHING_POSTGRES_DSN: postgres://openauthing@postgres:5432/openauthing?sslmode=disable
      OPENAUTHING_REDIS_ADDR: redis:6379
      OPENAUTHING_LOG_LEVEL: info
      OPENAUTHING_SESSION_SECRET: change-me-in-local-dev-only
      OPENAUTHING_OIDC_ISSUER: "${OPENAUTHING_OIDC_ISSUER:-http://host.docker.internal:8080}"
    ports:
      - "8080:8080"
    volumes:
      - ../../:/workspace
      - alicloud_cloudsso_go_mod_cache:/go/pkg/mod
      - alicloud_cloudsso_go_build_cache:/root/.cache/go-build
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  alicloud_cloudsso_postgres_data:
  alicloud_cloudsso_redis_data:
  alicloud_cloudsso_go_mod_cache:
  alicloud_cloudsso_go_build_cache:
